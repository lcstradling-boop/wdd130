<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Favorite Devotionals</title>
  <link rel="stylesheet" href="styles/styles.css" />
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="header-image">
        <h1>My Favorite<br>Devotionals</h1>
      </div>
    </header>
    <main>
      <div class="content-box">
        <!-- Add your devotional content here -->
         <table class="greyGridTable">
        <tr>
          <th>Speaker</th>
          <th>Title</th>
          <th>Location</th>
          <th>Year</th>
        </tr>
        <tr>
          <td>Trent Shippen</td>
          <td>Become Legendary</td>
          <td>BYU-Idaho</td>
          <td>2026</td>
        </tr>
        <tr>
          <td>Robert C. Gay</td>
          <td>Be True to the Voice of God</td>
          <td>BYU-Idaho</td>
          <td>2026</td>
        </tr>
        <tr>
          <td>Kassandra M. Mackley</td>
          <td>The Transforming Power of Jesus Christ  </td>
          <td>BYU-Idaho</td>
          <td>2026</td>
        </tr>
         </table>
         <form action="" method="get">
          <label for="Speaker">Speaker:</label>
          <input type="text" id="Speaker" name="Speaker"><br><br>
          <label for="Title">Title:</label>
          <input type="text" id="Title" name="Title"><br><br>
          <label for="Location">Location:</label>
          <input type="text" id="Location" name="Location"><br><br>
          <label for="Year">Year:</label>
          <input type="text" id="Year" name="Year"><br><br>
          <input type="submit" value="Submit">
         </form>
      </div>
    </main>
  </div>
</body>
</html>
